<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Fuel Stop Challenge</title><style>body{font-family:system-ui;max-width:860px;margin:20px auto;padding:0 14px;background:#0b1020;color:#e8eeff}input,select{padding:8px;border-radius:8px;border:1px solid #2b3d76;background:#111938;color:#e8eeff}button{background:#5d85ff;color:#fff;border:0;padding:10px 14px;border-radius:8px;font-weight:700}.row{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}.out{white-space:pre-wrap;margin-top:12px;padding:12px;border:1px solid #2b3d76;border-radius:8px;background:#10182e}</style></head><body><h1>Fuel Stop Challenge</h1><p>Arcade gas-pump stop game + AI coach for your next attempt.</p><div class='row'><label>Target $ <input id='target' value='37.50'></label><label>Stopped $ <input id='stopped' value='37.62'></label><label>Streak <input id='streak' value='3'></label><label>Mode <select id='mode'><option>Arcade</option><option>Rush Hour</option><option>Rainy Day</option></select></label></div><button id='go'>Get AI Coach</button><div id='out' class='out'>Output appears here.</div><script>go.onclick=async()=>{out.textContent='Thinking...';const body={target:target.value,stopped:stopped.value,streak:streak.value,mode:mode.value};const r=await fetch('/api/coach',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();out.textContent=r.ok?(d.content||'(empty)'):`Error: ${d.error||'request failed'}`};</script></body></html>
